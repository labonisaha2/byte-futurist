<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYTE x FUTURIST Conference</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top left,#6d4aff 0%,transparent 40%),radial-gradient(circle at bottom right,#3c1fa5 0%,transparent 35%),linear-gradient(135deg,#1b103d,#09090f);color:#fff}
.card{width:min(700px,90%);padding:60px;border-radius:28px;background:rgba(255,255,255,.05);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);text-align:center}
.tag{display:inline-block;color:#bca8ff;border-bottom:1px solid #8b6fff;padding-bottom:6px;margin-bottom:18px;text-transform:uppercase;letter-spacing:2px}
h1{font-size:3rem;margin-bottom:20px}
p{color:#ddd;line-height:1.8;margin-bottom:16px}
.code-box{margin:36px auto;padding:22px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15)}
.label{color:#bca8ff;text-transform:uppercase;letter-spacing:2px;font-size:.85rem}
.code{font-size:2rem;font-weight:800;letter-spacing:4px;margin:14px 0}
button{padding:14px 28px;border:none;border-radius:12px;background:#6d4aff;color:#fff;font-weight:600;cursor:pointer}
button:hover{background:#7d5eff}
.footer{margin-top:30px;color:#aaa}
</style>
</head>
<body>
<div class="card">
<div class="tag">BYTE Exclusive</div>
<h1>BYTE × FUTURIST Conference</h1>
<p>Thanks for being part of the BYTE community!</p>
<p>Use the exclusive discount code below when registering.</p>
<div class="code-box">
<div class="label">Discount Code</div>
<div class="code">BYTEISTHEBEST</div>
<button onclick="navigator.clipboard.writeText('BYTEISTHEBEST');this.innerText='Copied! ✓';setTimeout(()=>this.innerText='Copy Code',2000);">Copy Code</button>
</div>
<div class="footer">See you at the conference 🚀</div>
</div>
</body>
</html>
